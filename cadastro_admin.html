<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Admin - Pixel Memories</title>
<link rel="icon" href="fotos/logo.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <!-- ALERTA -->
        <div id="alerta" class="alerta-escondido">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="alerta-mensagem"></span>
        </div>

        <!-- ÍCONE -->
        <div class="login-icon">
            <i class="fa-solid fa-user-plus"></i>
        </div>

        <h2>Cadastrar Admin</h2>

        <p>Criar novo acesso ao painel</p>

        <!-- FORM -->
        <form action="php/cadastrar_admin.php" method="POST">

            <!-- USUÁRIO -->
            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input 
                    type="text" 
                    name="usuario" 
                    placeholder="Novo usuário"
                    required>

            </div>

            <!-- SENHA -->
            <div class="input-box">

                <i class="fa-solid fa-key"></i>

                <input 
                    type="password" 
                    name="senha" 
                    placeholder="Nova senha"
                    required>

            </div>

            <!-- BOTÃO -->
            <button type="submit">

                <i class="fa-solid fa-user-plus"></i>
                Criar Admin

            </button>

        </form>

        <span class="footer-text">
            © 2026 Pixel Memories
        </span>

    </div>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const erro = urlParams.get('erro');

const alerta = document.getElementById('alerta');
const mensagem = document.getElementById('alerta-mensagem');

if (erro) {
    alerta.classList.remove('alerta-escondido');
    alerta.classList.add('alerta-exibido', 'erro');

    if (erro === 'campos') {
        mensagem.innerText = "Preencha todos os campos.";
    } 
    else if (erro === 'existente') {
        mensagem.innerText = "Este usuário já existe.";
    } 
    else if (erro === 'banco') {
        mensagem.innerText = "Erro ao salvar no banco de dados.";
    }
}

if (erro) {
    setTimeout(() => {
        window.history.replaceState({}, document.title, window.location.pathname);
    }, 3000);
}
</script>

</body>
</html>
