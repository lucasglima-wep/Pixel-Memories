<!-- FUNDO -->

<div class="login-container">

    <!-- CARD -->

    <div class="login-box">
        <div id="alerta" class="alerta-escondido">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="alerta-mensagem"></span>
</div>

        <div class="login-icon">
            <i class="fa-solid fa-lock"></i>
        </div>

        <h2>Login Admin</h2>

        <p>Acesse o painel da galeria</p>

        <!-- FORM -->

        <form action="php/login.php" method="POST">

            <!-- USUÁRIO -->

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input 
                    type="text" 
                    name="usuario" 
                    placeholder="Usuário"
                    autocomplete="username"
                    required>

            </div>

            <!-- SENHA -->

            <div class="input-box">

                <i class="fa-solid fa-key"></i>

                <input 
                    type="password" 
                    name="senha" 
                    placeholder="Senha"
                    autocomplete="current-password"
                    required>

            </div>

            <!-- BOTÃO -->

            <button type="submit">

                <i class="fa-solid fa-right-to-bracket"></i>
                Entrar

            </button>

        </form>

        <span class="footer-text">
            © 2026 Pixel Memories
        </span>

    </div>

</div>
   
<script>
const urlParams = new URLSearchParams(window.location.search);
const status = urlParams.get('status'); 
const erro = urlParams.get('erro');     

const alerta = document.getElementById('alerta');
const mensagem = document.getElementById('alerta-mensagem');

if (erro || status) {
    // 1. Mostra o alerta removendo a classe de 'escondido' e colocando a de 'exibido'
    alerta.classList.remove('alerta-escondido');
    alerta.classList.add('alerta-exibido');

    // 2. Lógica para Acesso Negado 
    if (erro === 'acesso_negado') {
        alerta.classList.add('alerta-negado');
        mensagem.innerText = "Acesso negado! Por favor, faça login para continuar.";
    } 
    
    // 3. Lógica para Erros de Login
    else if (erro === 'senha' || erro === 'usuario') {
        alerta.classList.add('erro');
        mensagem.innerText = "Usuário ou senha incorretos.";
    }

    // 4. Lógica para Sucesso (Logout)
    else if (status === 'sucesso') {
        alerta.classList.add('sucesso');
        alerta.querySelector('i').className = "fa-solid fa-circle-check";
        mensagem.innerText = "Você saiu do sistema com segurança!";
    }

       else if (status === 'admin_criado') {
        alerta.classList.add('sucesso');
        alerta.querySelector('i').className = "fa-solid fa-circle-check";
        mensagem.innerText = "admin criado com sucesso!";
    }

    // 5. Limpar a URL e esconder após 4 segundos
    setTimeout(() => {
        window.history.replaceState({}, document.title, window.location.pathname);
        alerta.style.opacity = '0';
        setTimeout(() => {
            alerta.classList.replace('alerta-exibido', 'alerta-escondido');
            alerta.style.opacity = '1';
        }, 500);
    }, 4000);
}
</script>
